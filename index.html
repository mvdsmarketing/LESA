<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hidromecánica Lesa – Plan de Trabajo Junio 2025</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #4DB8E8;
      --accent-light: #e8f7fd;
      --accent-border: #a8dff5;
      --accent-btn: #1a9ecf;
      --bg: #F2F4F7;
      --card-bg: #ffffff;
      --border: #dde2e8;
      --border-light: #eaecef;
      --border-task: #f0f2f5;
      --text-primary: #3d4a5c;
      --text-secondary: #8a96a3;
      --text-tertiary: #b0b8c2;
      --text-muted: #5a6473;
      --input-bg: #f7f9fc;
      --hover-bg: #f7f9fc;
      --radius: 10px;
      --radius-sm: 6px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); min-height: 100vh; padding-bottom: 2rem; }
    .header { background: #fff; border-bottom: 3px solid var(--accent); padding: 1.1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; position: sticky; top: 0; z-index: 10; }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .header-title { font-size: 15px; font-weight: 600; color: var(--text-primary); line-height: 1.2; }
    .header-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .progress-summary { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .progress-ring-wrap { position: relative; width: 40px; height: 40px; }
    .progress-ring-wrap svg { position: absolute; top: 0; left: 0; }
    .progress-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--text-primary); }
    .progress-label { font-size: 12px; color: var(--text-secondary); line-height: 1.3; }
    .progress-label strong { display: block; font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #c8cdd4; transition: background 0.3s; flex-shrink: 0; }
    .sync-dot.synced { background: #4ade80; }
    .sync-dot.syncing { background: #f59e0b; }
    .weeks-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; padding: 1.25rem 1.5rem 0; max-width: 1400px; margin: 0 auto; }
    .week-card { background: var(--card-bg); border-radius: var(--radius); border: 0.5px solid var(--border); overflow: hidden; transition: border-color 0.2s; }
    .week-card.completed { border-color: #16a34a44; }
    .week-header { padding: 11px 14px 10px; border-bottom: 0.5px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; border-left: 3px solid var(--accent); }
    .week-number { font-size: 10px; font-family: 'DM Mono', monospace; font-weight: 500; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2px; }
    .week-dates { font-size: 14px; font-weight: 600; color: var(--text-primary); line-height: 1.2; }
    .week-badge { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 99px; border: 0.5px solid; white-space: nowrap; }
    .week-badge.pending { color: var(--text-secondary); border-color: var(--border); background: var(--input-bg); }
    .week-badge.in-progress { color: #92600a; border-color: #f59e0b55; background: #fef3c755; }
    .week-badge.done { color: #166534; border-color: #16a34a44; background: #dcfce755; }
    .week-body { padding: 4px 0; }
    .task-row { display: flex; flex-direction: column; padding: 8px 14px; gap: 6px; border-bottom: 0.5px solid var(--border-task); transition: background 0.15s; }
    .task-row:last-child { border-bottom: none; }
    .task-row:hover { background: var(--hover-bg); }
    .task-top { display: flex; align-items: flex-start; gap: 10px; }
    .checkbox { width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid #c8cdd4; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; margin-top: 1px; transition: all 0.15s; background: #fff; }
    .checkbox.checked { background: var(--accent); border-color: var(--accent); }
    .checkbox svg { display: none; }
    .checkbox.checked svg { display: block; }
    .task-text { font-size: 13px; color: var(--text-primary); line-height: 1.4; flex: 1; transition: all 0.2s; }
    .task-text.done { text-decoration: line-through; color: var(--text-tertiary); }
    .comment-area { display: flex; align-items: center; gap: 6px; padding-left: 28px; }
    .comment-input { flex: 1; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--text-muted); background: var(--input-bg); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 5px 9px; outline: none; transition: border-color 0.15s; resize: none; height: 28px; line-height: 18px; overflow: hidden; }
    .comment-input:focus { border-color: var(--accent); color: var(--text-primary); }
    .comment-input::placeholder { color: var(--text-tertiary); font-size: 12px; }
    .save-btn { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; color: var(--accent-btn); background: var(--accent-light); border: 0.5px solid var(--accent-border); border-radius: var(--radius-sm); padding: 4px 9px; cursor: pointer; white-space: nowrap; transition: background 0.15s; display: none; }
    .save-btn:hover { background: #cceefa; }
    .save-btn.visible { display: block; }
    .week-footer { padding: 8px 14px; border-top: 0.5px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; }
    .week-progress-bar { flex: 1; height: 4px; background: var(--border-light); border-radius: 99px; overflow: hidden; margin-right: 10px; }
    .week-progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s ease; }
    .week-progress-fill.done-fill { background: #16a34a; }
    .week-count { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text-secondary); white-space: nowrap; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: var(--text-primary); color: white; font-size: 13px; padding: 10px 16px; border-radius: var(--radius-sm); opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; }
    .loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; z-index: 100; transition: opacity 0.4s; }
    .loading-screen.hidden { opacity: 0; pointer-events: none; }
    .loading-spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    .loading-text { font-size: 13px; color: var(--text-secondary); }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="loading-screen" id="loading-screen">
  <div class="loading-spinner"></div>
  <div class="loading-text">Cargando plan de trabajo…</div>
</div>

<div style="display:none" id="app">
  <div class="header">
    <div class="header-left">
      <div>
        <div class="header-title">Hidromecánica Lesa</div>
        <div class="header-sub">Plan de mantenimiento web · Junio 2025</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:14px;">
      <div class="progress-summary">
        <div class="progress-ring-wrap">
          <svg width="40" height="40" viewBox="0 0 40 40">
            <circle cx="20" cy="20" r="16" fill="none" stroke="#e2e6ea" stroke-width="4"/>
            <circle id="ring-main" cx="20" cy="20" r="16" fill="none" stroke="#4DB8E8" stroke-width="4"
              stroke-linecap="round" stroke-dasharray="100.53" stroke-dashoffset="100.53"
              transform="rotate(-90 20 20)" style="transition: stroke-dashoffset 0.6s ease"/>
          </svg>
          <div class="progress-pct" id="pct-main">0%</div>
        </div>
        <div class="progress-label">
          <strong id="label-done">0 / 16</strong>
          tareas completadas
        </div>
      </div>
      <div class="sync-dot" id="sync-dot" title="Estado de sincronización"></div>
    </div>
  </div>
  <div class="weeks-grid" id="weeks-grid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://uqkkqowehjjjepaawcfh.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_uy_W-VaN6iJf5Hie4U1lJQ_642Pxo6N';
  const TABLE_NAME = 'lesa_plan';
  const ROW_ID = 'junio_2025';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const WEEKS = [
    { id:'w1', label:'Semana 1', dates:'1 – 5 de junio', tasks:[
      'Auditoría inicial del sitio: velocidad, errores y enlaces rotos',
      'Actualización de plugins, temas y CMS a versiones estables',
      'Revisión y optimización de imágenes pesadas (compresión y lazy load)',
      'Verificación de certificado SSL y configuración de HTTPS'
    ]},
    { id:'w2', label:'Semana 2', dates:'8 – 12 de junio', tasks:[
      'Revisión del formulario de contacto y flujo de envío de emails',
      'Optimización SEO on-page: meta títulos, descripciones y encabezados',
      'Backup completo del sitio y base de datos',
      'Análisis de Analytics: tráfico, rebote y páginas más visitadas'
    ]},
    { id:'w3', label:'Semana 3', dates:'15 – 19 de junio', tasks:[
      'Revisión de compatibilidad móvil y ajustes responsive',
      'Limpieza de base de datos: revisiones, spam y datos obsoletos',
      'Prueba de velocidad y aplicación de caché y minificación',
      'Actualización de contenidos desactualizados o con errores tipográficos'
    ]},
    { id:'w4', label:'Semana 4', dates:'22 – 26 de junio', tasks:[
      'Escaneo de seguridad: malware, vulnerabilidades y permisos',
      'Revisión de integraciones externas (Google Maps, redes sociales, etc.)',
      'Informe mensual de actividad con capturas y resumen de mejoras',
      'Reunión de cierre y definición de objetivos para el mes siguiente'
    ]}
  ];

  let state = {};
  WEEKS.forEach(w => { state[w.id] = { checks:[false,false,false,false], comments:['','','',''] }; });

  async function loadState() {
    setSyncDot('syncing');
    try {
      const { data, error } = await db
        .from(TABLE_NAME).select('data').eq('id', ROW_ID).single();
      if (error && error.code !== 'PGRST116') throw error;
      if (data && data.data) state = data.data;
    } catch(e) { console.error('Error cargando:', e); }
    setSyncDot('synced');
    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('app').style.display = 'block';
    render();
    subscribeRealtime();
  }

  async function saveState() {
    setSyncDot('syncing');
    try {
      const { error } = await db.from(TABLE_NAME)
        .upsert({ id: ROW_ID, data: state, updated_at: new Date().toISOString() });
      if (error) throw error;
      setSyncDot('synced');
    } catch(e) { console.error('Error guardando:', e); setSyncDot(''); }
  }

  function subscribeRealtime() {
    db.channel('lesa_plan_changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: TABLE_NAME, filter: `id=eq.${ROW_ID}` },
        payload => {
          if (payload.new && payload.new.data) {
            const incoming = payload.new.data;
            if (JSON.stringify(incoming) !== JSON.stringify(state)) { state = incoming; render(); }
          }
        })
      .subscribe();
  }

  function setSyncDot(status) {
    const dot = document.getElementById('sync-dot');
    dot.className = 'sync-dot';
    if (status === 'synced') dot.classList.add('synced');
    if (status === 'syncing') dot.classList.add('syncing');
    dot.title = status === 'synced' ? 'Sincronizado' : status === 'syncing' ? 'Guardando…' : 'Sin conexión';
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function getStatus(wid) {
    const d = state[wid].checks.filter(Boolean).length;
    return d === 0 ? 'pending' : d === 4 ? 'done' : 'in-progress';
  }

  function updateGlobalProgress() {
    const done = WEEKS.reduce((a,w) => a + state[w.id].checks.filter(Boolean).length, 0);
    const pct = Math.round((done/16)*100), circ = 2*Math.PI*16;
    document.getElementById('ring-main').style.strokeDashoffset = circ-(pct/100)*circ;
    document.getElementById('pct-main').textContent = pct+'%';
    document.getElementById('label-done').textContent = done+' / 16';
  }

  function render() {
    const grid = document.getElementById('weeks-grid');
    grid.innerHTML = '';
    WEEKS.forEach(week => {
      const ws = state[week.id];
      const doneCount = ws.checks.filter(Boolean).length;
      const status = getStatus(week.id);
      const pct = Math.round((doneCount/4)*100);
      const bClass = status==='done'?'done':status==='in-progress'?'in-progress':'pending';
      const bLabel = status==='done'?'Completada':status==='in-progress'?'En progreso':'Pendiente';
      const dotColor = status==='done'?'#16a34a':status==='in-progress'?'#f59e0b':'#c8cdd4';
      const card = document.createElement('div');
      card.className = 'week-card'+(status==='done'?' completed':'');
      card.innerHTML = `
        <div class="week-header">
          <div><div class="week-number">${week.label}</div><div class="week-dates">${week.dates}</div></div>
          <div class="week-badge ${bClass}"><span class="status-dot" style="background:${dotColor}"></span>${bLabel}</div>
        </div>
        <div class="week-body" id="body-${week.id}"></div>
        <div class="week-footer">
          <div class="week-progress-bar"><div class="week-progress-fill ${status==='done'?'done-fill':''}" style="width:${pct}%"></div></div>
          <div class="week-count">${doneCount}/4</div>
        </div>`;
      const body = card.querySelector(`#body-${week.id}`);
      week.tasks.forEach((task, i) => {
        const row = document.createElement('div');
        row.className = 'task-row';
        row.innerHTML = `
          <div class="task-top">
            <div class="checkbox ${ws.checks[i]?'checked':''}" data-week="${week.id}" data-idx="${i}">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="task-text ${ws.checks[i]?'done':''}">${task}</div>
          </div>
          <div class="comment-area">
            <input class="comment-input" type="text" placeholder="Agregar comentario…"
              value="${(ws.comments[i]||'').replace(/"/g,'&quot;')}"
              data-week="${week.id}" data-idx="${i}" />
            <button class="save-btn" data-week="${week.id}" data-idx="${i}">Guardar</button>
          </div>`;
        body.appendChild(row);
      });
      grid.appendChild(card);
    });
    attachEvents();
    updateGlobalProgress();
  }

  function attachEvents() {
    document.querySelectorAll('.checkbox').forEach(cb => {
      cb.addEventListener('click', async () => {
        const wid = cb.dataset.week, idx = parseInt(cb.dataset.idx);
        state[wid].checks[idx] = !state[wid].checks[idx];
        await saveState();
        showToast(state[wid].checks[idx] ? '✓ Tarea completada' : 'Tarea reabierta');
        render();
      });
    });
    document.querySelectorAll('.comment-input').forEach(inp => {
      const btn = inp.parentElement.querySelector('.save-btn');
      inp.addEventListener('input', () => btn.classList.add('visible'));
      inp.addEventListener('keydown', async e => {
        if (e.key === 'Enter') { e.preventDefault(); await commitComment(inp); }
      });
    });
    document.querySelectorAll('.save-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        await commitComment(btn.parentElement.querySelector('.comment-input'));
      });
    });
  }

  async function commitComment(inp) {
    const wid = inp.dataset.week, idx = parseInt(inp.dataset.idx);
    state[wid].comments[idx] = inp.value.trim();
    await saveState();
    showToast('Comentario guardado');
    inp.parentElement.querySelector('.save-btn').classList.remove('visible');
  }

  loadState();
</script>
</body>
</html>
